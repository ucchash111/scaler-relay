version: '3.8'

services:
  scalar-relay:
    build: .
    container_name: scalar-relay
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - scalar_config:/app/config
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - SESSION_SECRET=${SESSION_SECRET:-scalar_secret_replaceme}
      - SERVICE_FQDN=${SERVICE_FQDN_SCALAR:-http://localhost:3000}
    labels:
      - "coolify.managed=true"
      - "coolify.proxy=true"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  scalar_config:
